<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6c5ce7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Food Tracker">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Food Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-row">
        <h1>Food Tracker</h1>
        <span id="sync-status" class="sync-status sync-local">○ Local only</span>
      </div>
      <nav>
        <button class="tab active" data-tab="log">Log</button>
        <button class="tab" data-tab="today">Today</button>
        <button class="tab" data-tab="trends">Weekly Trends</button>
        <button class="tab" data-tab="timing">Meal Timing</button>
      </nav>
    </header>

    <main>
      <!-- Log Entry Tab -->
      <section id="tab-log" class="tab-content active">
        <form id="food-form">
          <div class="form-row">
            <div class="form-group flex-2">
              <label for="food-name">Food Item <span id="autofill-hint" class="autofill-hint">type to search foods</span></label>
              <div class="autocomplete-wrap">
                <input type="text" id="food-name" placeholder="e.g. Grilled chicken breast" required autocomplete="off">
                <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
              </div>
            </div>
            <div class="form-group">
              <label for="meal-type">Meal</label>
              <select id="meal-type">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="calories">Calories</label>
              <input type="number" id="calories" placeholder="250" min="0" required>
            </div>
            <div class="form-group">
              <label for="protein">Protein (g)</label>
              <input type="number" id="protein" placeholder="20" min="0" step="0.1">
            </div>
            <div class="form-group">
              <label for="carbs">Carbs (g)</label>
              <input type="number" id="carbs" placeholder="30" min="0" step="0.1">
            </div>
            <div class="form-group">
              <label for="fat">Fat (g)</label>
              <input type="number" id="fat" placeholder="10" min="0" step="0.1">
            </div>
            <div class="form-group">
              <label for="fiber">Fiber (g)</label>
              <input type="number" id="fiber" placeholder="5" min="0" step="0.1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="quantity">Qty</label>
              <div class="qty-control">
                <button type="button" class="qty-btn" id="qty-minus">-</button>
                <input type="number" id="quantity" value="1" min="0.25" step="0.25">
                <button type="button" class="qty-btn" id="qty-plus">+</button>
              </div>
            </div>
            <div class="form-group">
              <label>Serving <span id="serving-base" class="autofill-hint"></span></label>
              <input type="text" id="serving-size" placeholder="1 cup, 200g">
            </div>
            <div class="form-group">
              <label for="entry-date">Date</label>
              <input type="date" id="entry-date">
            </div>
            <div class="form-group">
              <label for="entry-time">Time</label>
              <input type="time" id="entry-time">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group flex-2">
              <label for="notes">Notes</label>
              <input type="text" id="notes" placeholder="Optional notes...">
            </div>
          </div>
          <button type="submit" class="btn-primary">Add Entry</button>
        </form>

        <div id="recent-entries">
          <h3>Recent Entries</h3>
          <div id="entries-list"></div>
        </div>
      </section>

      <!-- Today Tab -->
      <section id="tab-today" class="tab-content">
        <div class="summary-cards">
          <div class="card calories-card">
            <span class="card-label">Calories</span>
            <span class="card-value" id="today-calories">0</span>
            <span class="card-target">/ <span id="cal-target">2000</span></span>
            <div class="progress-bar"><div class="progress-fill" id="cal-progress"></div></div>
          </div>
          <div class="card">
            <span class="card-label">Protein</span>
            <span class="card-value" id="today-protein">0g</span>
            <span class="card-target">/ <span id="protein-target">150</span>g</span>
            <div class="progress-bar"><div class="progress-fill protein-fill" id="protein-progress"></div></div>
          </div>
          <div class="card">
            <span class="card-label">Carbs</span>
            <span class="card-value" id="today-carbs">0g</span>
            <span class="card-target">/ <span id="carbs-target">250</span>g</span>
            <div class="progress-bar"><div class="progress-fill carbs-fill" id="carbs-progress"></div></div>
          </div>
          <div class="card">
            <span class="card-label">Fat</span>
            <span class="card-value" id="today-fat">0g</span>
            <span class="card-target">/ <span id="fat-target">65</span>g</span>
            <div class="progress-bar"><div class="progress-fill fat-fill" id="fat-progress"></div></div>
          </div>
          <div class="card">
            <span class="card-label">Fiber</span>
            <span class="card-value" id="today-fiber">0g</span>
            <span class="card-target">/ <span id="fiber-target">30</span>g</span>
            <div class="progress-bar"><div class="progress-fill fiber-fill" id="fiber-progress"></div></div>
          </div>
        </div>
        <div class="macro-chart-container">
          <h3>Macro Breakdown</h3>
          <canvas id="macro-donut" width="280" height="280"></canvas>
          <div id="macro-legend" class="chart-legend"></div>
        </div>
        <div id="today-meals">
          <h3>Today's Meals</h3>
          <div id="today-entries-list"></div>
        </div>
      </section>

      <!-- Weekly Trends Tab -->
      <section id="tab-trends" class="tab-content">
        <div class="chart-controls">
          <button class="chip active" data-metric="calories">Calories</button>
          <button class="chip" data-metric="protein">Protein</button>
          <button class="chip" data-metric="carbs">Carbs</button>
          <button class="chip" data-metric="fat">Fat</button>
          <button class="chip" data-metric="fiber">Fiber</button>
        </div>
        <div class="chart-container">
          <canvas id="trends-chart" width="700" height="320"></canvas>
        </div>
        <div class="weekly-summary" id="weekly-summary"></div>
      </section>

      <!-- Meal Timing Tab -->
      <section id="tab-timing" class="tab-content">
        <h3>Calorie Distribution by Time of Day (Last 7 Days)</h3>
        <div class="chart-container">
          <canvas id="timing-chart" width="700" height="320"></canvas>
        </div>
        <div class="timing-insights" id="timing-insights"></div>
        <h3>Per-Meal Averages (Last 7 Days)</h3>
        <div class="meal-avg-cards" id="meal-avg-cards"></div>
      </section>
    </main>

    <!-- Settings Modal -->
    <div id="settings-overlay" class="modal-overlay hidden">
      <div class="modal">
        <h3>Daily Targets</h3>
        <div class="form-row">
          <div class="form-group"><label>Calories</label><input type="number" id="set-calories" value="2000"></div>
          <div class="form-group"><label>Protein (g)</label><input type="number" id="set-protein" value="150"></div>
          <div class="form-group"><label>Carbs (g)</label><input type="number" id="set-carbs" value="250"></div>
          <div class="form-group"><label>Fat (g)</label><input type="number" id="set-fat" value="65"></div>
          <div class="form-group"><label>Fiber (g)</label><input type="number" id="set-fiber" value="30"></div>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" id="cancel-settings">Cancel</button>
          <button class="btn-primary" id="save-settings">Save</button>
        </div>
      </div>
    </div>
    <button class="fab" id="settings-btn" title="Daily targets">&#9881;</button>
  </div>

  <!-- Firebase SDK (compat mode for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- Your Firebase config -->
  <script src="firebase-config.js"></script>
  <!-- App -->
  <script src="app.js"></script>
  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
    }
  </script>
</body>
</html>
